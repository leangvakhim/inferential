<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Understanding Confidence Intervals</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom styles for mathematical fractions to avoid external math libraries */
        .math-fraction {
            display: inline-flex;
            flex-direction: column;
            vertical-align: middle;
            text-align: center;
            margin: 0 0.3rem;
            font-size: 0.9em;
            line-height: 1.2;
        }

        .math-fraction>span:first-child {
            border-bottom: 1px solid currentColor;
            padding: 0 0.2rem;
        }

        .math-fraction>span:last-child {
            padding: 0 0.2rem;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Custom Range Slider */
        input[type=range] {
            accent-color: #3b82f6;
            /* Tailwind blue-500 */
        }
    </style>
</head>

<body
    class="bg-slate-100 h-screen flex items-center justify-center p-2 md:p-6 font-sans text-slate-800 overflow-hidden">

    <div class="w-full max-w-6xl h-full max-h-[900px] bg-white rounded-2xl shadow-2xl flex flex-col overflow-hidden">

        <!-- Header -->
        <header class="bg-blue-600 text-white p-5 md:p-6 flex items-center justify-between shrink-0">
            <div>
                <h1 class="text-2xl font-bold">Inferential Statistics: Confidence Intervals</h1>
                <p class="text-blue-100 text-sm mt-1">An interactive, step-by-step visual guide</p>
            </div>
            <div class="hidden md:flex items-center space-x-2">
                <svg class="w-8 h-8 text-blue-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z">
                    </path>
                </svg>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="flex-1 flex flex-col md:flex-row overflow-hidden relative">

            <!-- Left Panel: Text & Explanations -->
            <div
                class="w-full h-1/2 md:h-full md:w-[45%] p-6 md:p-8 overflow-y-auto border-b md:border-b-0 md:border-r border-slate-200 flex flex-col bg-slate-50 relative z-10">
                <div id="text-container" class="fade-in my-auto">
                    <h2 id="step-title" class="text-2xl font-bold text-blue-800 mb-4"></h2>
                    <div id="step-desc" class="text-slate-600 text-base md:text-lg mb-6 leading-relaxed"></div>
                    <div id="step-example"
                        class="bg-blue-50 border-l-4 border-blue-500 p-4 rounded-r-lg text-sm md:text-base text-blue-900 shadow-sm">
                    </div>
                </div>
            </div>

            <!-- Right Panel: Visualization -->
            <div class="w-full h-1/2 md:h-full md:w-[55%] relative bg-white flex items-center justify-center p-4">
                <div id="vis-html-overlay"
                    class="absolute inset-0 z-10 hidden flex-col items-center py-8 px-6 bg-white overflow-y-auto">
                </div>
                <canvas id="vis-canvas" class="w-full h-full block"></canvas>
            </div>

        </main>

        <!-- Footer -->
        <footer class="p-4 md:p-6 bg-white border-t border-slate-200 flex items-center justify-between shrink-0">
            <button id="btn-prev"
                class="px-6 py-2.5 rounded-lg font-semibold text-slate-600 bg-slate-100 hover:bg-slate-200 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
                &larr; Previous
            </button>

            <!-- Progress Indicators -->
            <div class="flex space-x-2" id="progress-dots">
            </div>

            <button id="btn-next"
                class="px-6 py-2.5 rounded-lg font-semibold text-white bg-blue-600 hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed shadow-md hover:shadow-lg transition-all">
                Next &rarr;
            </button>
        </footer>
    </div>

    <script src="../js/confidence_interval.js"></script>
</body>

</html>
