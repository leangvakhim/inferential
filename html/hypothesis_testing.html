<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Hypothesis Testing Guide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- MathJax for rendering LaTeX formulas dynamically -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            startup: {
                typeset: false // We will manually typeset after rendering steps
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>

    <style>
        .fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .math-container {
            overflow-x: auto;
            padding: 1rem 0;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen text-slate-800 font-sans flex items-center justify-center p-4">

    <div class="max-w-4xl w-full bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col h-full md:min-h-[700px]">

        <!-- Header & Progress Bar -->
        <div class="bg-blue-600 text-white p-6">
            <h1 class="text-2xl font-bold mb-4">Understanding Hypothesis Testing</h1>

            <div class="relative pt-1">
                <div class="flex mb-2 items-center justify-between text-xs font-semibold">
                    <div>
                        <span id="progress-text"
                            class="text-blue-100 uppercase bg-blue-800 rounded-full px-3 py-1 shadow-sm">
                            Step 1 of 7
                        </span>
                    </div>
                </div>
                <div class="overflow-hidden h-2 mb-4 text-xs flex rounded bg-blue-200">
                    <div id="progress-bar" style="width: 14.28%"
                        class="shadow-none flex flex-col text-center whitespace-nowrap text-white justify-center bg-yellow-400 transition-all duration-500 ease-in-out">
                    </div>
                </div>
            </div>
        </div>

        <!-- Dynamic Content Area -->
        <div class="p-6 md:p-8 flex-grow flex flex-col overflow-y-auto" id="content-area">
            <!-- Content injected via JS -->
        </div>

        <!-- Navigation Footer -->
        <div class="bg-gray-50 border-t border-gray-100 p-6 flex justify-between items-center rounded-b-2xl">
            <button id="btn-prev"
                class="px-6 py-2.5 rounded-lg font-medium text-slate-600 bg-white border border-slate-300 hover:bg-slate-100 hover:text-slate-800 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                &larr; Previous
            </button>
            <button id="btn-next"
                class="px-6 py-2.5 rounded-lg font-medium text-white bg-blue-600 hover:bg-blue-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed shadow-sm">
                Next Step &rarr;
            </button>
        </div>
    </div>

    <script src="../js/hypothesis_testing.js"></script>
</body>

</html>
