<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One-Sample T-Test: Interactive Guide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- MathJax for rendering LaTeX formulas beautifully -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        /* Smooth fade-in animation for step transitions */
        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Custom scrollbar for better aesthetics */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>

<body class="bg-slate-100 text-slate-800 font-sans antialiased min-h-screen flex items-center justify-center p-4">

    <!-- Main Application Container -->
    <div
        class="max-w-5xl w-full bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col h-[85vh] min-h-[650px] border border-slate-200">

        <!-- Header -->
        <header class="bg-indigo-600 text-white p-6 pb-4">
            <h1 class="text-2xl md:text-3xl font-bold mb-2">One-Sample T-Test Masterclass</h1>
            <p class="text-indigo-200 text-sm md:text-base">Understanding Inferential Statistics Step-by-Step</p>
        </header>

        <!-- Progress Bar -->
        <div class="bg-indigo-100 h-2 w-full">
            <div id="progress-bar" class="bg-indigo-500 h-2 transition-all duration-500 ease-in-out" style="width: 0%;">
            </div>
        </div>

        <!-- Content Area -->
        <div class="flex-grow overflow-y-auto p-6 md:p-8" id="content-area">
            <div id="step-container" class="fade-in grid grid-cols-1 lg:grid-cols-2 gap-8 h-full">
                <!-- Concept Column -->
                <div class="flex flex-col space-y-4">
                    <div class="inline-flex items-center space-x-2 text-indigo-600 font-semibold mb-2">
                        <span id="step-badge" class="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full text-sm">Step
                            1 of 7</span>
                        <h2 id="step-title" class="text-xl md:text-2xl font-bold text-slate-800">Title</h2>
                    </div>
                    <div id="step-concept" class="prose prose-slate max-w-none text-slate-600 text-lg leading-relaxed">
                        <!-- Concept text injected via JS -->
                    </div>
                </div>

                <!-- Real World Example Column -->
                <div class="bg-slate-50 border border-slate-200 rounded-xl p-6 shadow-sm flex flex-col">
                    <h3 class="text-lg font-bold text-slate-800 mb-4 border-b border-slate-200 pb-2 flex items-center">
                        <span class="text-2xl mr-2">🍪</span> The Bakery Scenario
                    </h3>
                    <div id="step-example" class="prose prose-slate max-w-none text-slate-700 flex-grow">
                        <!-- Example text injected via JS -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer / Navigation Controls -->
        <footer class="bg-slate-50 border-t border-slate-200 p-4 md:p-6 flex justify-between items-center">
            <button id="btn-prev" onclick="changeStep(-1)"
                class="px-6 py-2.5 rounded-lg font-medium text-slate-600 bg-white border border-slate-300 hover:bg-slate-100 transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
                Previous
            </button>

            <div id="step-indicator" class="text-sm font-medium text-slate-500 hidden md:block">
                <!-- Dots injected via JS -->
            </div>

            <button id="btn-next" onclick="changeStep(1)"
                class="px-6 py-2.5 rounded-lg font-medium text-white bg-indigo-600 hover:bg-indigo-700 shadow-md hover:shadow-lg transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center">
                Next
                <svg class="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                </svg>
            </button>
        </footer>
    </div>

    <script src="../js/one_sample_t_test.js"></script>
</body>

</html>
